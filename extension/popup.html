<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #0e0e18;
      color: #e0e0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a3a;
    }
    .shield { font-size: 24px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .ver { font-size: 11px; color: #6a6a80; }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 13px;
    }
    .status-label { color: #8888a0; }
    .status-value { font-weight: 500; }
    .status-value.online { color: #22c55e; }
    .status-value.offline { color: #ef4444; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 0;
    }
    .stat-card {
      background: #151520;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #f0f0f5;
    }
    .stat-number.green { color: #22c55e; }
    .stat-number.red { color: #ef4444; }
    .stat-label {
      font-size: 11px;
      color: #6a6a80;
      margin-top: 2px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a3a;
    }
    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover { background: #5558e6; }
    .btn-secondary {
      background: #1e1e30;
      color: #c0c0d0;
      border: 1px solid #3a3a4a;
    }
    .btn-secondary:hover { background: #2a2a3f; }

    .current-site {
      background: #151520;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 12px;
    }
    .current-site .domain {
      font-weight: 600;
      color: #f0f0f5;
    }
    .current-site .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 6px;
    }
    .badge.trusted { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge.unknown { background: rgba(245,158,11,0.15); color: #f59e0b; }
  </style>
</head>
<body>
  <div class="header">
    <span class="shield">&#x1f6e1;</span>
    <div>
      <h1>LinkShield</h1>
      <div class="ver">v1.0.0</div>
    </div>
  </div>

  <div class="status-row">
    <span class="status-label">Analysis Server</span>
    <span class="status-value" id="serverStatus">Checking...</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number green" id="statChecked">0</div>
      <div class="stat-label">Links scanned today</div>
    </div>
    <div class="stat-card">
      <div class="stat-number red" id="statBlocked">0</div>
      <div class="stat-label">Threats caught</div>
    </div>
  </div>

  <div class="current-site" id="currentSite">
    <span class="domain">...</span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnWhitelist">Trust current site</button>
    <button class="btn btn-secondary" id="btnScan">Scan current page</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
