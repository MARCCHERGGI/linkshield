<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkShield — Scanning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 20px;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .shield-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0f0f5;
    }
    .header .subtitle {
      font-size: 13px;
      color: #8888a0;
      margin-top: 2px;
    }

    /* URL Display */
    .url-box {
      background: #151520;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      word-break: break-all;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: #a0a0b8;
      line-height: 1.5;
    }
    .url-box .domain {
      color: #e0e0e8;
      font-weight: 600;
    }

    /* Progress */
    .progress-bar {
      height: 3px;
      background: #1a1a2a;
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #818cf8);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-fill.safe { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .progress-fill.caution { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .progress-fill.danger { background: linear-gradient(90deg, #ef4444, #f87171); }

    /* Checks List */
    .checks {
      background: #151520;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .check-row {
      display: flex;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid #1e1e30;
      gap: 12px;
      transition: background 0.2s;
    }
    .check-row:last-child { border-bottom: none; }
    .check-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      font-weight: 700;
    }
    .check-icon.pending {
      border: 2px solid #4a4a6a;
      animation: spin 1s linear infinite;
    }
    .check-icon.pass {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }
    .check-icon.warn {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }
    .check-icon.fail {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    .check-name {
      font-size: 14px;
      color: #c0c0d0;
      min-width: 130px;
    }
    .check-detail {
      font-size: 13px;
      color: #8888a0;
      flex: 1;
    }
    .check-detail.warn { color: #f59e0b; }
    .check-detail.fail { color: #ef4444; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Verdict */
    .verdict {
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .verdict.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .verdict.safe {
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .verdict.caution {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .verdict.danger {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .verdict h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }
    .verdict.safe h2 { color: #22c55e; }
    .verdict.caution h2 { color: #f59e0b; }
    .verdict.danger h2 { color: #ef4444; }
    .verdict p {
      font-size: 14px;
      color: #a0a0b8;
      line-height: 1.5;
    }
    .verdict .countdown {
      margin-top: 8px;
      font-size: 13px;
      color: #6366f1;
    }

    /* Auto-proceed progress */
    .auto-progress {
      height: 3px;
      background: #1a1a2a;
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .auto-progress-fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
      transition: width linear;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-safe {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }
    .btn-safe:hover { filter: brightness(1.1); }
    .btn-secondary {
      background: #1e1e30;
      color: #c0c0d0;
      border: 1px solid #3a3a4a;
    }
    .btn-secondary:hover { background: #2a2a3f; }
    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
    .btn-ghost {
      background: transparent;
      color: #8888a0;
      border: 1px solid #2a2a3a;
    }
    .btn-ghost:hover { background: #1a1a2a; }

    /* Server offline notice */
    .offline-notice {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #f59e0b;
      display: none;
    }

    /* Score badge */
    .score-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }
    .score-badge.safe { background: rgba(34,197,94,0.15); color: #22c55e; }
    .score-badge.caution { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .score-badge.danger { background: rgba(239,68,68,0.15); color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="shield-icon">&#x1f6e1;</div>
      <div>
        <h1>LinkShield</h1>
        <div class="subtitle">Scanning link before you visit...</div>
      </div>
    </div>

    <!-- Offline Notice -->
    <div class="offline-notice" id="offlineNotice">
      Analysis server offline — running basic checks only. Start the server for full protection.
    </div>

    <!-- URL Display -->
    <div class="url-box" id="urlBox">Loading...</div>

    <!-- Progress -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Checks -->
    <div class="checks" id="checksList"></div>

    <!-- Verdict -->
    <div class="verdict" id="verdict"></div>

    <!-- Actions -->
    <div class="actions" id="actions" style="display:none"></div>
  </div>

  <script src="check.js"></script>
</body>
</html>
